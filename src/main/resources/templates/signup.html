<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 4Identity</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
    <!-- 상단 네비게이션 바 -->
    <nav class="navbar">
        <div class="navbar-container">
            <!-- 왼쪽 사이트 로고와 이름 -->
            <div class="navbar-logo">
                <a href="/">4Identity</a>
            </div>
            
            <!-- 오른쪽 로그인/회원가입 버튼 -->
            <div class="navbar-auth">
                <button onclick="location.href='/'" class="auth-btn">홈으로</button>
            </div>
        </div>
    </nav>
    
    <!-- 메인 콘텐츠 영역 -->
    <main class="container">
        <div class="signup-container">
            <h1>회원가입</h1>
            
            <div th:if="${session.errorMessage}" class="error-message">
                <p th:text="${session.errorMessage}"></p>
            </div>
            
            <form id="signupForm" action="/signup" method="post">
                <div class="form-group">
                    <label for="userid">아이디</label>
                    <input type="text" id="userid" name="userid" required placeholder="아이디를 입력해주세요.">
                    <button id="userIdBtn">중복확인</button>
                </div>
                
                <div class="form-group">
                    <label for="passwd">비밀번호</label>
                    <input type="password" id="passwd" name="passwd" required placeholder="비밀번호를 입력해주세요">
                </div>

                <div class="form-group">
                    <label for="passwd">비밀번호 확인</label>
                    <input type="password" id="passwdCh" name="passwdCh" required placeholder="비밀번호를 입력해주세요">
                </div>
                
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="이메일을 입력해주세요">
                </div>
                
                <div class="form-group">
                    <label>어떤 분야에 관심있나요?</label>
                    <p style="color: #888; font-size: 12px;" >관심 분야에 맞는 뉴스를 골라 요약해드릴게요.</p>
                    <div class="interest-container">
                        <div class="interest-option">
                            <input type="radio" id="interest1" name="interest" value="산업 및 트렌드" required>
                            <label for="interest1">산업 및 트렌드</label>
                        </div>
                        <div class="interest-option">
                            <input type="radio" id="interest2" name="interest" value="소비자 기술 및 제품 리뷰">
                            <label for="interest2">소비자 기술 및 제품 리뷰</label>
                        </div>
                        <div class="interest-option">
                            <input type="radio" id="interest3" name="interest" value="정책 및 법률">
                            <label for="interest3">정책 및 법률</label>
                        </div>
                        <div class="interest-option">
                            <input type="radio" id="interest4" name="interest" value="기업 및 브랜드">
                            <label for="interest4">기업 및 브랜드</label>
                        </div>
                        <div class="interest-option">
                            <input type="radio" id="interest5" name="interest" value="미래 기술 및 혁신">
                            <label for="interest5">미래 기술 및 혁신</label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">회원가입</button>
            </form>
            
            <p class="form-footer">이미 계정이 있으신가요? <a href="/login" id="showLogin">로그인</a></p>
        </div>
    </main>
    
    <script src="/js/main.js"> </script>
</body>
</html>
