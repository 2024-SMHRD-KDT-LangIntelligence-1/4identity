<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Identity Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        h1 {
            color: #333;
        }
        img {
            width: 80%;
            max_width: 600px;
            border: 1px solid #ddd;
            border-radius:10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div>
        <h1 th:text="${message}">Default Message</h1>
        <img th:src="${imageUrl}" alt="News Image">
    </div>
</body>
</html>
